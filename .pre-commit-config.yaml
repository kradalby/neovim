repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: local
    hooks:
      # Formatting is treefmt via the flake (no standalone treefmt.toml); the
      # full build runs in CI.
      - id: treefmt
        name: nix fmt (treefmt) check
        entry: bash -c 'nix build --fallback .#checks.x86_64-linux.formatting'
        language: system
        pass_filenames: false
        files: \.(nix|lua|md)$
